<div 
  class="p-6 rounded-2xl text-base-content font-sans"
  id="data-container"
  data-values="{{ data | tojson | forceescape }}"
>
  <div class="max-w-4xl mx-auto">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 items-start">
      <!-- Summary -->
      <div class="md:col-span-1 card bg-base-100 border border-base-200/10 shadow p-5">
        <div class="flex items-center gap-4">
          <div id="scoreBadge" hx-preserve class="w-24 h-24 rounded-full flex items-center justify-center font-bold text-lg shadow-md"></div>
          <div>
            <h3 class="text-lg font-semibold text-base-content">Safety Health Score</h3>
            <p class="text-sm text-base-content/70 mt-1">Combined domain security score — 0 (at risk) to 100 (excellent).</p>
          </div>
        </div>

        <div class="mt-4">
          <h4 class="text-sm font-semibold text-base-content/80 mb-2">Breakdown</h4>
          <div id="breakdownList" class="space-y-3"></div>
        </div>
      </div>

      <!-- Chart -->
      <div class="md:col-span-2 card bg-base-100 border border-base-200/10 shadow p-5">
        <div class="flex justify-between items-start">
          <div>
            <h3 class="text-lg font-semibold text-base-content">Safety Health Profile</h3>
            <p class="text-sm text-base-content/70">Visual representation of security health across attack surfaces</p>
          </div>
        </div>

        <div class="mt-4 flex items-stretch">
          <div class="bg-transparent rounded-lg p-3 w-full" style="min-height:420px;">
            <canvas hx-preserve id="riskChart"></canvas>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
